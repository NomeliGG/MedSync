server:
  port: ${SERVER_PORT:8200}

spring:
  application:
    name: medical-record-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/local_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    open-in-view: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}