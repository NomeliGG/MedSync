logging:
  level:
    org.springframework.web.servlet:
      mvc.method.annotation.RequestResponseBodyMethodProcessor: TRACE
      DispatcherServlet: TRACE

management:
  endpoint:
    health:
      show-details: always

server:
  port: ${SERVER_PORT:8100}

spring:
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost:9092}
  application:
    name: user-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    open-in-view: false
  mvc:
    log-request-details: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}