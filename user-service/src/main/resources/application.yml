logging:
  level:
    org.springframework.web.servlet:
      mvc.method.annotation.RequestResponseBodyMethodProcessor: TRACE
      DispatcherServlet: TRACE

server:
  port: ${SERVER_PORT:8100}

spring:
  application:
    name: user-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    open-in-view: false
  mvc:
    log-request-details: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}