server:
  port: ${SERVER_PORT:8300}

management:
  endpoint:
    health:
      show-details: always

spring:
  application:
    name: appointment-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    open-in-view: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}