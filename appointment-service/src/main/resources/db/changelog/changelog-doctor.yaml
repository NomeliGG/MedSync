databaseChangeLog:
  - changeSet:
      id: 1
      author: roma
      changes:
        - createTable:
            tableName: doctor
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: first_name
                  type: VARCHAR(128)
              - column:
                  name: last_name
                  type: VARCHAR(128)
              - column:
                  name: date_of_birth
                  type: DATE
              - column:
                  name: sex
                  type: CHAR(1)
              - column:
                  name: additional_info
                  type: TEXT
