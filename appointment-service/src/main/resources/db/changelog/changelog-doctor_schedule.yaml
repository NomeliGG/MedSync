databaseChangeLog:
  - changeSet:
      id: 3
      author: roma
      changes:
        - createTable:
            tableName: doctor_schedule
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: doctor_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: day_of_week
                  type: DATE
              - column:
                  name: work_interval
                  type: TSRANGE
              - column:
                  name: break_interval
                  type: TSRANGE
              - column:
                  name: created
                  type: TIMESTAMP
              - column:
                  name: updated
                  type: TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: doctor_schedule
            baseColumnNames: doctor_id
            referencedTableName: doctor
            referencedColumnNames: id
            constraintName: fk_doctor_schedule_doctor
