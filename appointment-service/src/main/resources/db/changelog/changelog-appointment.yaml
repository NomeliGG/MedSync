databaseChangeLog:
  - changeSet:
      id: 4
      author: roma
      changes:
        - createTable:
            tableName: appointment
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: doctor_id
                  type: BIGINT
              - column:
                  name: patient_id
                  type: BIGINT
              - column:
                  name: start_time
                  type: DATETIME
              - column:
                  name: end_time
                  type: DATETIME
              - column:
                  name: status
                  type: VARCHAR(32)
              - column:
                  name: visit_type
                  type: VARCHAR(32)
              - column:
                  name: reason
                  type: TEXT
              - column:
                  name: created
                  type: TIMESTAMP
              - column:
                  name: updated
                  type: TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: appointment
            baseColumnNames: doctor_id
            referencedTableName: doctor
            referencedColumnNames: id
            constraintName: fk_appointment_doctor

        - addForeignKeyConstraint:
            baseTableName: appointment
            baseColumnNames: patient_id
            referencedTableName: patient
            referencedColumnNames: id
            constraintName: fk_appointment_patient